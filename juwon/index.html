<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학교 생활 유형 테스트</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="quiz-container">
    <div class="progress-box">
      <div class="progress-text" id="progressText">진행률 바</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <section class="question-box"><p id="questionText">질문 텍스트</p></section>
    <section class="guide-box"><p>선택지 안내 텍스트</p></section>

    <section class="options">
      <button class="option-btn" type="button">선택지 1</button>
      <button class="option-btn" type="button">선택지 2</button>
      <button class="option-btn" type="button">선택지 3</button>
      <button class="option-btn" type="button">선택지 4</button>
    </section>

    <section class="bottom-buttons">
      <button id="prevBtn" type="button">이전 버튼</button>
      <button id="nextBtn" type="button">다음 버튼</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
